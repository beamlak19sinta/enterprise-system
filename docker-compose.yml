version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb+srv://beamlaksintayheu6_db_user:muna1921@cluster0.0k7dpxu.mongodb.net/erp_system?retryWrites=true&w=majority&appName=Cluster0&compressors=zlib
      JWT_SECRET: erp_system_super_secret_jwt_key_2024_production_32chars_min
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: erp_system_refresh_secret_key_2024_production_32chars_min
      JWT_REFRESH_EXPIRES_IN: 30d
      FRONTEND_URL: http://localhost:3000
      BCRYPT_ROUNDS: "12"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - erp-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: erp-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge
